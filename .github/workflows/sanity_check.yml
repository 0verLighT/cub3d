name: sanity_checks

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'includes/**'
      - 'Makefile'
      - 'meson.build'
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
    norminette:
        name: 'Norminette 42'
        runs-on: 'ubuntu-latest'
        steps:
            - uses: actions/checkout@v6
              with:
                submodules: true
                fetch-depth: 0
            - uses: actions/setup-python@v6
              with:
                python-version: '3.11'
            - run: python3 -m pip install -U norminette
            - name: Norminette "libft"
              run: norminette ${{ github.workspace }}/subprojects/libft
            - name: Norminette "cub3d"
              run: norminette ${{ github.workspace }}/includes ${{ github.workspace }}/src
    makefile:
      name: 'Make on Ubuntu'
      runs-on: 'ubuntu-latest'
      needs: norminette
      steps:
        - uses: actions/checkout@v6
          with:
            submodules: true
            fetch-depth: 0
        - name: Install dependencies
          run: |
              sudo apt-get update -y
              sudo apt-get install -y --no-install-recommends libxext-dev libx11-dev libbsd-dev
        - name: Build
          run: make
    meson:
      name: Build with meson on ubuntu
      runs-on: 'ubuntu-latest'
      needs: norminette
      steps:
        - uses: actions/checkout@v6
          with:
            submodules: true
            fetch-depth: 0
        - name: Install Python 3.12
          uses: actions/setup-python@v6
          with:
            python-version: 3.12
        - name: Install build tools && dependencies
          run: |
              sudo apt-get update -y
              sudo apt-get install -y --no-install-recommends libxext-dev libx11-dev libbsd-dev
              python3 -m pip install meson ninja
        - name: Build with meson
          run: |
              meson setup build --prefix=$PWD/usr
              meson install -C build
